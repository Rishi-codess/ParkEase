# ?????????????????????????????????????????????????????????????????????????????
# application.properties  ?  ParkEase Backend
# ?????????????????????????????????????????????????????????????????????????????

# ?? Server ????????????????????????????????????????????????????????????????????
server.port=8080

# ?? MySQL DataSource ??????????????????????????????????????????????????????????
# serverTimezone=Asia/Kolkata ensures MySQL stores/reads times in IST
spring.datasource.url=jdbc:mysql://localhost:3306/parkease_db?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true&connectionTimeZone=Asia/Kolkata
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ?? JPA / Hibernate ???????????????????????????????????????????????????????????
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# ? Tell Hibernate to use IST when converting LocalDateTime to/from DB
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata

# ?? Jackson ???????????????????????????????????????????????????????????????????
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Kolkata

# ?? JWT ???????????????????????????????????????????????????????????????????????
jwt.secret=ParkEase@SecretKey#2025$SpringBoot3&JWT
jwt.expiration=86400000

# ?? Logging ???????????????????????????????????????????????????????????????????
logging.level.com.demo.parkease=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG